name: AKS Bootstrap

# Triggered automatically after Terraform Infrastructure succeeds, and manually
# via workflow_dispatch for re-runs or one-off config seeds.
#
# Dev bootstrap runs after a successful pull_request terraform run.
# Prod bootstrap runs after a successful push-to-main terraform run.
#
# All steps are idempotent (helm upgrade --install, kubectl apply).
on:
  workflow_run:
    workflows: ["Terraform Infrastructure"]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to bootstrap"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

jobs:
  # ── Dev bootstrap ─────────────────────────────────────────────────────────────
  # Runs after a successful dev terraform apply (triggered by pull_request), or
  # manually via workflow_dispatch.
  bootstrap-dev:
    name: Bootstrap Dev
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Configure kubectl
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "${TF_VAR_project}-${TF_VAR_environment}-rg" \
            --name "${TF_VAR_project}-${TF_VAR_environment}-aks" \
            --overwrite-existing

      # ── Phase 2 — Gateway API CRDs ─────────────────────────────────────────────
      # Standard channel CRDs pinned at v1.2.1. Update comment when upgrading.
      - name: Bootstrap AKS — Gateway API CRDs
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f \
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml

      # ── Phase 2 — NGINX Gateway Fabric ────────────────────────────────────────
      # Chart 2.5.0. Creates GatewayClass "nginx" and a LoadBalancer service in
      # gateway-system. Capture the external IP after first install:
      #   kubectl get svc -n gateway-system ngf-nginx-gateway-fabric
      # Set DNS A records and update workloads/bootstrap/README.md before Phase 3.
      - name: Bootstrap AKS — NGINX Gateway Fabric
        shell: bash
        run: |
          set -euo pipefail
          helm repo add nginx-gateway-fabric \
            oci://ghcr.io/nginx/charts || true
          helm upgrade --install ngf \
            oci://ghcr.io/nginx/charts/nginx-gateway-fabric \
            --namespace gateway-system \
            --create-namespace \
            --version 2.5.0 \
            --set nginx.service.type=LoadBalancer \
            --wait --timeout 10m
          echo "Gateway LoadBalancer IP:"
          kubectl get svc -n gateway-system ngf-nginx-gateway-fabric \
            --output jsonpath='{.status.loadBalancer.ingress[0].ip}{"\n"}'

      # ── Phase 2 — Gateway manifest ─────────────────────────────────────────────
      # CERT_SECRET_NAME is substituted by envsubst before kubectl apply.
      # The TLS secret is created by cert-manager in Phase 3.
      - name: Bootstrap AKS — Gateway manifest
        shell: bash
        env:
          CERT_SECRET_NAME: ${{ format('{0}-dev-tls', vars.TF_VAR_PROJECT) }}
        run: |
          set -euo pipefail
          envsubst '${CERT_SECRET_NAME}' \
            < workloads/bootstrap/gateway.yaml \
            | kubectl apply -f -

      # ── Phase 3 — cert-manager ─────────────────────────────────────────────────
      # Chart 1.20.1. Gateway API support is BETA and default-on in 1.20+.
      - name: Bootstrap AKS — cert-manager
        shell: bash
        run: |
          set -euo pipefail
          helm repo add jetstack https://charts.jetstack.io
          helm repo update jetstack
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version 1.20.1 \
            --set crds.enabled=true \
            --wait --timeout 5m

      - name: Bootstrap AKS — ClusterIssuers
        shell: bash
        env:
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          set -euo pipefail
          envsubst '${LETSENCRYPT_EMAIL}' \
            < workloads/bootstrap/cluster-issuers.yaml \
            | kubectl apply -f -

      # ── Phase 4 — ArgoCD ───────────────────────────────────────────────────────
      # Chart 9.4.17. server.insecure=true for plain-HTTP kubectl port-forward access.
      # ArgoCD is NOT exposed via the Gateway — access is internal only.
      # Initial password: kubectl -n argocd get secret argocd-initial-admin-secret
      #   -o jsonpath='{.data.password}' | base64 -d
      - name: Bootstrap AKS — ArgoCD
        shell: bash
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 9.4.17 \
            --set-string 'configs.params.server\.insecure=true' \
            --set 'repoServer.livenessProbe.timeoutSeconds=10' \
            --set 'repoServer.readinessProbe.timeoutSeconds=10' \
            --wait --timeout 10m

      - name: Bootstrap AKS — ArgoCD NetworkPolicy
        shell: bash
        run: |
          set -euo pipefail
          kubectl label ns argocd kubernetes.io/metadata.name=argocd --overwrite
          kubectl apply -f workloads/bootstrap/argocd-netpol.yaml

      # ── Phase 5 — OpenClaw config seed ─────────────────────────────────────────
      # continue-on-error: bootstrap succeeded; config can be re-seeded manually:
      #   bash scripts/seed-openclaw-ci.sh dev
      - name: Seed OpenClaw Config
        continue-on-error: true
        shell: bash
        run: |
          chmod +x scripts/seed-openclaw-ci.sh
          bash scripts/seed-openclaw-ci.sh dev

  # ── Prod bootstrap ────────────────────────────────────────────────────────────
  # Runs after a successful prod terraform apply (triggered by push to main), or
  # manually via workflow_dispatch.
  bootstrap-prod:
    name: Bootstrap Prod
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Configure kubectl
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "${TF_VAR_project}-${TF_VAR_environment}-rg" \
            --name "${TF_VAR_project}-${TF_VAR_environment}-aks" \
            --overwrite-existing

      - name: Bootstrap AKS — Gateway API CRDs
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f \
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml

      - name: Bootstrap AKS — NGINX Gateway Fabric
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install ngf \
            oci://ghcr.io/nginx/charts/nginx-gateway-fabric \
            --namespace gateway-system \
            --create-namespace \
            --version 2.5.0 \
            --set nginx.service.type=LoadBalancer \
            --wait --timeout 10m
          echo "Gateway LoadBalancer IP:"
          kubectl get svc -n gateway-system ngf-nginx-gateway-fabric \
            --output jsonpath='{.status.loadBalancer.ingress[0].ip}{"\n"}'

      - name: Bootstrap AKS — Gateway manifest
        shell: bash
        env:
          CERT_SECRET_NAME: ${{ format('{0}-prod-tls', vars.TF_VAR_PROJECT) }}
        run: |
          set -euo pipefail
          envsubst '${CERT_SECRET_NAME}' \
            < workloads/bootstrap/gateway.yaml \
            | kubectl apply -f -

      - name: Bootstrap AKS — cert-manager
        shell: bash
        run: |
          set -euo pipefail
          helm repo add jetstack https://charts.jetstack.io
          helm repo update jetstack
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version 1.20.1 \
            --set crds.enabled=true \
            --wait --timeout 5m

      - name: Bootstrap AKS — ClusterIssuers
        shell: bash
        env:
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          set -euo pipefail
          envsubst '${LETSENCRYPT_EMAIL}' \
            < workloads/bootstrap/cluster-issuers.yaml \
            | kubectl apply -f -

      - name: Bootstrap AKS — ArgoCD
        shell: bash
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 9.4.17 \
            --set-string 'configs.params.server\.insecure=true' \
            --set 'repoServer.livenessProbe.timeoutSeconds=10' \
            --set 'repoServer.readinessProbe.timeoutSeconds=10' \
            --wait --timeout 10m

      - name: Bootstrap AKS — ArgoCD NetworkPolicy
        shell: bash
        run: |
          set -euo pipefail
          kubectl label ns argocd kubernetes.io/metadata.name=argocd --overwrite
          kubectl apply -f workloads/bootstrap/argocd-netpol.yaml

      - name: Seed OpenClaw Config
        continue-on-error: true
        shell: bash
        env:
          ALLOW_PROD_SEED: "true"
        run: |
          chmod +x scripts/seed-openclaw-ci.sh
          bash scripts/seed-openclaw-ci.sh prod
