name: Backup OpenClaw

# Triggers:
# - schedule: daily at 02:00 UTC.
# - workflow_dispatch: manual trigger with optional environment selection.
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment(s)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - dev
          - prod

# Minimal permissions: only read repo contents. Azure credentials are passed via env.
permissions:
  contents: read

jobs:
  backup-dev:
    name: Backup Dev
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'both' || inputs.environment == 'dev'))
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Run Backup
        shell: bash
        run: |
          chmod +x scripts/backup-openclaw.sh
          bash scripts/backup-openclaw.sh dev

  backup-prod:
    name: Backup Prod
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'both' || inputs.environment == 'prod'))
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Run Backup
        shell: bash
        run: |
          chmod +x scripts/backup-openclaw.sh
          bash scripts/backup-openclaw.sh prod
