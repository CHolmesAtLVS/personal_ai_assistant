name: OpenClaw Test Dev

# Triggers:
# - workflow_run: fires after Terraform Dev completes successfully on a PR to dev.
# - workflow_dispatch: manual retrigger (dev only).
on:
  workflow_run:
    workflows: ["Terraform Dev"]
    types: [completed]
  workflow_dispatch:

# Minimal permissions: only read repo contents. Secrets are passed explicitly via env.
permissions:
  contents: read

jobs:
  test-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.name == 'Terraform Dev' &&
       github.event.workflow_run.conclusion == 'success')
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Configure kubectl
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "${TF_VAR_project}-${TF_VAR_environment}-rg" \
            --name "${TF_VAR_project}-${TF_VAR_environment}-aks" \
            --overwrite-existing

      - name: Install openclaw CLI
        run: npm install -g openclaw

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Wait — ArgoCD sync + pod readiness
        shell: bash
        run: |
          set -euo pipefail
          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0

          echo "Waiting for ArgoCD to sync openclaw-dev..."
          until kubectl get application openclaw-dev -n argocd \
                -o jsonpath='{.status.sync.status}' 2>/dev/null \
                | grep -q "Synced"; do
            if [[ $ELAPSED -ge $TIMEOUT ]]; then
              echo "Timeout waiting for ArgoCD sync after ${TIMEOUT}s"; exit 1
            fi
            sleep $INTERVAL
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done
          echo "ArgoCD sync: Synced"

          echo "Waiting for OpenClaw pod readiness..."
          kubectl rollout status deployment/openclaw -n openclaw --timeout=5m
          echo "OpenClaw pod: Ready"

      - name: Run OpenClaw health tests
        id: health
        shell: bash
        run: |
          echo "## OpenClaw Dev Integration Tests — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          export CI=true
          bash scripts/test-multi-model.sh dev | tee /tmp/health-out.txt
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/health-out.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # az containerapp exec is rate-limited (~5 sessions / 10 min).
      # Sleep 120s to avoid hitting the rate limit immediately after bootstrap's seed step.
      - name: Wait before config validation (avoid az containerapp exec rate limit)
        run: sleep 120

      - name: Run OpenClaw config validation
        id: config
        shell: bash
        run: |
          echo "## Config Validation" >> "$GITHUB_STEP_SUMMARY"
          bash scripts/test-openclaw-config.sh dev | tee /tmp/config-out.txt
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/config-out.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health tests | ${{ steps.health.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Config validation | ${{ steps.config.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
