name: Terraform Deploy

# Triggers:
# - pull_request (opened/synchronize/reopened): plan + apply to dev; plan-only to prod (pre-merge visibility).
# - pull_request (closed + merged to main): plan + apply to prod environment.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev only; prod deploys via PR merge)"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "terraform/**"
      - "scripts/**.sh"
      - "config/openclaw.batch.json"
      - ".github/workflows/terraform-deploy.yml"

# Minimal permissions: only read repo contents. Secrets are passed explicitly via env.
permissions:
  contents: read

jobs:
  terraform-dev:
    name: Terraform Dev
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'dev' || inputs.environment == '')) ||
      (github.event_name == 'pull_request' && github.event.action != 'closed' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
      TFSTATE_LOCATION: ${{ secrets.TFSTATE_LOCATION }}
      TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
      TFSTATE_KEY: terraform-dev.tfstate
      TF_VAR_public_ip: ${{ secrets.PUBLIC_IP }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: dev
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
      TF_VAR_cost_center: ${{ vars.TF_VAR_COST_CENTER }}
      TF_VAR_ai_model_name: ${{ vars.TF_VAR_AI_MODEL_NAME || 'gpt-5.4-mini' }}
      TF_VAR_ai_model_version: ${{ vars.TF_VAR_AI_MODEL_VERSION || '2026-03-17' }}
      TF_VAR_ai_model_capacity: ${{ vars.TF_VAR_AI_MODEL_CAPACITY || '10' }}
      TF_VAR_openclaw_image_tag: ${{ vars.TF_VAR_OPENCLAW_IMAGE_TAG || '2026.3.31' }}
      TF_VAR_openclaw_state_share_quota_gb: ${{ vars.TF_VAR_OPENCLAW_STATE_SHARE_QUOTA_GB || '100' }}
      TF_VAR_monthly_budget_amount: ${{ vars.TF_VAR_MONTHLY_BUDGET_AMOUNT || '25' }}
      TF_VAR_budget_alert_email: ${{ secrets.BUDGET_ALERT_EMAIL }}
      TF_VAR_embedding_model_name: ${{ vars.TF_VAR_EMBEDDING_MODEL_NAME || 'text-embedding-3-large' }}
      TF_VAR_embedding_model_version: ${{ vars.TF_VAR_EMBEDDING_MODEL_VERSION || '1' }}
      TF_VAR_embedding_model_capacity: ${{ vars.TF_VAR_EMBEDDING_MODEL_CAPACITY || '50' }}
      TF_VAR_azure_ai_api_key: ${{ secrets.TF_VAR_AZURE_AI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast if TF_VAR_AZURE_AI_API_KEY is not set in the GitHub Environment secrets.
      # This variable must be non-empty on every Terraform apply — the Terraform variable
      # validation rejects empty values before any plan or apply can proceed.
      # lifecycle { ignore_changes = [value] } on the KV secret prevents overwriting an
      # existing key, but Terraform still validates the variable on every run.
      # Fix: GitHub repository → Settings → Environments → dev → Secrets → TF_VAR_AZURE_AI_API_KEY
      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          _key="${TF_VAR_azure_ai_api_key:-}"
          if [[ -z "${_key// }" ]]; then
            echo "::error::TF_VAR_AZURE_AI_API_KEY is empty or not set in the GitHub 'dev' Environment secrets."
            echo "  This secret must contain the Azure AI Foundry account API key."
            echo "  It must be non-empty (and not purely whitespace) on every Terraform apply."
            echo "  Set it at: GitHub repository → Settings → Environments → dev → Secrets"
            echo "  See docs/secrets-inventory.md for the full secrets inventory."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.12"

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Bootstrap Terraform Backend
        shell: bash
        run: |
          chmod +x scripts/bootstrap-tfstate.sh
          ./scripts/bootstrap-tfstate.sh

      - name: Terraform Fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="resource_group_name=${TFSTATE_RG}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: terraform/tfplan

      # On the very first run (cluster not in state), apply only module.aks so
      # the Helm provider can read kube_config, then run the full apply.
      - name: Terraform Apply — AKS (bootstrap gate)
        run: terraform -chdir=terraform apply -input=false -auto-approve -target=module.aks

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan

      - name: Configure kubectl
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "${TF_VAR_project}-${TF_VAR_environment}-rg" \
            --name "${TF_VAR_project}-${TF_VAR_environment}-aks" \
            --overwrite-existing

      # ── AKS Platform Bootstrap: Phase 2 — Gateway API CRDs ───────────────────────
      # Standard channel CRDs pinned at v1.2.1; NGINX GF and cert-manager are managed
      # by helm_release resources in terraform/helm.tf.
      - name: Bootstrap AKS — Gateway API CRDs
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f \
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml

      # ── AKS Platform Bootstrap: Phase 2 — Gateway manifest ───────────────────────
      # Applies the shared Gateway resource. CERT_SECRET_NAME is substituted by
      # envsubst before kubectl apply. The TLS secret will be created by cert-manager
      # in Phase 3; the Gateway listener tolerates a missing secret at this stage.
      - name: Bootstrap AKS — Gateway manifest
        shell: bash
        env:
          CERT_SECRET_NAME: ${{ format('{0}-dev-tls', vars.TF_VAR_PROJECT) }}
        run: |
          set -euo pipefail
          envsubst '${CERT_SECRET_NAME}' \
            < workloads/bootstrap/gateway.yaml \
            | kubectl apply -f -

      - name: Bootstrap AKS — ClusterIssuers
        shell: bash
        env:
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          set -euo pipefail
          envsubst '${LETSENCRYPT_EMAIL}' \
            < workloads/bootstrap/cluster-issuers.yaml \
            | kubectl apply -f -

      # Phase 4 — ArgoCD (GitOps controller)
      # Chart 9.4.17: server.insecure=true for plain-HTTP access via kubectl port-forward.
      # ArgoCD is NOT exposed via the Gateway — access is internal only.
      # Retrieve initial password: kubectl -n argocd get secret argocd-initial-admin-secret
      #   -o jsonpath='{.data.password}' | base64 -d
      - name: Bootstrap AKS — ArgoCD
        shell: bash
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 9.4.17 \
            --set-string 'configs.params.server\.insecure=true' \
            --wait --timeout 10m

      - name: Bootstrap AKS — ArgoCD NetworkPolicy
        shell: bash
        run: |
          set -euo pipefail
          kubectl label ns argocd kubernetes.io/metadata.name=argocd --overwrite
          kubectl apply -f workloads/bootstrap/argocd-netpol.yaml

      # Uploads config/openclaw.batch.json to Azure Files, applies and validates it
      # inside the running container via az containerapp exec + script(1) PTY workaround.
      # Uses node /app/openclaw.mjs directly — no openclaw CLI on the runner needed.
      # continue-on-error: seed failures are non-fatal — Terraform succeeded; config
      # can be re-seeded manually with: bash scripts/seed-openclaw-ci.sh dev
      - name: Seed OpenClaw Config
        continue-on-error: true
        shell: bash
        run: |
          chmod +x scripts/seed-openclaw-ci.sh
          bash scripts/seed-openclaw-ci.sh dev

  # Runs terraform plan against the prod environment on every PR — before merge.
  # Surfaces prod-specific validation failures (variable errors, provider issues,
  # state drift) while the PR is still open and can be fixed without merging.
  # Plan-only: no apply or config seed runs until the PR is merged.
  terraform-prod-plan:
    name: Terraform Prod (Plan)
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
      TFSTATE_LOCATION: ${{ secrets.TFSTATE_LOCATION }}
      TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
      TFSTATE_KEY: terraform-prod.tfstate
      TF_VAR_public_ip: ${{ secrets.PUBLIC_IP }}
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: prod
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
      TF_VAR_cost_center: ${{ vars.TF_VAR_COST_CENTER }}
      TF_VAR_ai_model_name: ${{ vars.TF_VAR_AI_MODEL_NAME || 'gpt-5.4-mini' }}
      TF_VAR_ai_model_version: ${{ vars.TF_VAR_AI_MODEL_VERSION || '2026-03-17' }}
      TF_VAR_ai_model_capacity: ${{ vars.TF_VAR_AI_MODEL_CAPACITY || '10' }}
      TF_VAR_openclaw_image_tag: ${{ vars.TF_VAR_OPENCLAW_IMAGE_TAG || '2026.3.31' }}
      TF_VAR_openclaw_state_share_quota_gb: ${{ vars.TF_VAR_OPENCLAW_STATE_SHARE_QUOTA_GB || '100' }}
      TF_VAR_monthly_budget_amount: ${{ vars.TF_VAR_MONTHLY_BUDGET_AMOUNT || '25' }}
      TF_VAR_budget_alert_email: ${{ secrets.BUDGET_ALERT_EMAIL }}
      TF_VAR_embedding_model_name: ${{ vars.TF_VAR_EMBEDDING_MODEL_NAME || 'text-embedding-3-large' }}
      TF_VAR_embedding_model_version: ${{ vars.TF_VAR_EMBEDDING_MODEL_VERSION || '1' }}
      TF_VAR_embedding_model_capacity: ${{ vars.TF_VAR_EMBEDDING_MODEL_CAPACITY || '50' }}
      TF_VAR_azure_ai_api_key: ${{ secrets.TF_VAR_AZURE_AI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          _key="${TF_VAR_azure_ai_api_key:-}"
          if [[ -z "${_key// }" ]]; then
            echo "::error::TF_VAR_AZURE_AI_API_KEY is empty or not set in the GitHub 'prod' Environment secrets."
            echo "  This secret must contain the Azure AI Foundry account API key."
            echo "  It must be non-empty (and not purely whitespace) on every Terraform plan or apply."
            echo "  Set it at: GitHub repository → Settings → Environments → prod → Secrets"
            echo "  See docs/secrets-inventory.md for the full secrets inventory."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.12"

      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Bootstrap Terraform Backend
        shell: bash
        run: |
          chmod +x scripts/bootstrap-tfstate.sh
          ./scripts/bootstrap-tfstate.sh

      - name: Terraform Fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="resource_group_name=${TFSTATE_RG}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-prod-premerge
          path: terraform/tfplan

  terraform-prod:
    name: Terraform Prod
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    runs-on: ubuntu-latest
    environment: prod
    env:
      # Service Principal credentials for Azure CLI and Terraform authentication.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      # Remote state backend coordinates. Passed as -backend-config args to terraform init.
      TFSTATE_RG: ${{ secrets.TFSTATE_RG }}
      TFSTATE_LOCATION: ${{ secrets.TFSTATE_LOCATION }}
      TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
      TFSTATE_KEY: terraform-prod.tfstate
      # TF_VAR_* variables are automatically picked up by Terraform as input variable values.
      TF_VAR_public_ip: ${{ secrets.PUBLIC_IP }}
      # Non-sensitive Terraform input variables sourced from GitHub repository variables.
      TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
      TF_VAR_environment: prod
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
      TF_VAR_cost_center: ${{ vars.TF_VAR_COST_CENTER }}
      TF_VAR_ai_model_name: ${{ vars.TF_VAR_AI_MODEL_NAME || 'gpt-5.4-mini' }}
      TF_VAR_ai_model_version: ${{ vars.TF_VAR_AI_MODEL_VERSION || '2026-03-17' }}
      TF_VAR_ai_model_capacity: ${{ vars.TF_VAR_AI_MODEL_CAPACITY || '10' }}
      TF_VAR_openclaw_image_tag: ${{ vars.TF_VAR_OPENCLAW_IMAGE_TAG || '2026.3.31' }}
      TF_VAR_openclaw_state_share_quota_gb: ${{ vars.TF_VAR_OPENCLAW_STATE_SHARE_QUOTA_GB || '100' }}
      TF_VAR_monthly_budget_amount: ${{ vars.TF_VAR_MONTHLY_BUDGET_AMOUNT || '25' }}
      TF_VAR_budget_alert_email: ${{ secrets.BUDGET_ALERT_EMAIL }}
      TF_VAR_embedding_model_name: ${{ vars.TF_VAR_EMBEDDING_MODEL_NAME || 'text-embedding-3-large' }}
      TF_VAR_embedding_model_version: ${{ vars.TF_VAR_EMBEDDING_MODEL_VERSION || '1' }}
      TF_VAR_embedding_model_capacity: ${{ vars.TF_VAR_EMBEDDING_MODEL_CAPACITY || '50' }}
      TF_VAR_azure_ai_api_key: ${{ secrets.TF_VAR_AZURE_AI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail fast if TF_VAR_AZURE_AI_API_KEY is not set in the GitHub Environment secrets.
      # This variable must be non-empty on every Terraform apply — the Terraform variable
      # validation rejects empty values before any plan or apply can proceed.
      # lifecycle { ignore_changes = [value] } on the KV secret prevents overwriting an
      # existing key, but Terraform still validates the variable on every run.
      # Fix: GitHub repository → Settings → Environments → prod → Secrets → TF_VAR_AZURE_AI_API_KEY
      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          _key="${TF_VAR_azure_ai_api_key:-}"
          if [[ -z "${_key// }" ]]; then
            echo "::error::TF_VAR_AZURE_AI_API_KEY is empty or not set in the GitHub 'prod' Environment secrets."
            echo "  This secret must contain the Azure AI Foundry account API key."
            echo "  It must be non-empty (and not purely whitespace) on every Terraform apply."
            echo "  Set it at: GitHub repository → Settings → Environments → prod → Secrets"
            echo "  See docs/secrets-inventory.md for the full secrets inventory."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.12"

      # Authenticates the runner as the CI Service Principal and targets the correct subscription.
      # Credentials come from GitHub Secrets only — nothing is hardcoded.
      - name: Azure Login (Service Principal)
        shell: bash
        run: |
          set -euo pipefail
          az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      # Idempotent Azure CLI script that creates the state resource group, storage account,
      # and blob container if they do not already exist. Safe to re-run; prints
      # BOOTSTRAP-STATE: prefixed status lines and exits non-zero on missing inputs.
      - name: Bootstrap Terraform Backend
        shell: bash
        run: |
          chmod +x scripts/bootstrap-tfstate.sh
          ./scripts/bootstrap-tfstate.sh

      # Fails the workflow if any .tf file is not canonically formatted.
      - name: Terraform Fmt
        run: terraform -chdir=terraform fmt -check -recursive

      # Initialises the azurerm backend using secrets injected at runtime.
      # No backend values are committed to the repository.
      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="resource_group_name=${TFSTATE_RG}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}"

      # Validates configuration syntax and provider schema compliance.
      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      # Upload the plan as an artifact for audit trail.
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-prod
          path: terraform/tfplan

      # On the very first run (cluster not in state), apply only module.aks so
      # the Helm provider can read kube_config, then run the full apply.
      - name: Terraform Apply — AKS (bootstrap gate)
        run: terraform -chdir=terraform apply -input=false -auto-approve -target=module.aks

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan

      - name: Configure kubectl
        shell: bash
        run: |
          set -euo pipefail
          az aks get-credentials \
            --resource-group "${TF_VAR_project}-${TF_VAR_environment}-rg" \
            --name "${TF_VAR_project}-${TF_VAR_environment}-aks" \
            --overwrite-existing

      # ── AKS Platform Bootstrap: Phase 2 — Gateway API CRDs ───────────────────────
      # Standard channel CRDs pinned at v1.2.1; NGINX GF and cert-manager are managed
      # by helm_release resources in terraform/helm.tf.
      - name: Bootstrap AKS — Gateway API CRDs
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f \
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml

      # ── AKS Platform Bootstrap: Phase 2 — Gateway manifest ───────────────────────
      # Applies the shared Gateway resource. CERT_SECRET_NAME is substituted by
      # envsubst before kubectl apply. The TLS secret will be created by cert-manager
      # in Phase 3; the Gateway listener tolerates a missing secret at this stage.
      - name: Bootstrap AKS — Gateway manifest
        shell: bash
        env:
          CERT_SECRET_NAME: ${{ format('{0}-prod-tls', vars.TF_VAR_PROJECT) }}
        run: |
          set -euo pipefail
          envsubst '${CERT_SECRET_NAME}' \
            < workloads/bootstrap/gateway.yaml \
            | kubectl apply -f -

      - name: Bootstrap AKS — ClusterIssuers
        shell: bash
        env:
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          set -euo pipefail
          envsubst '${LETSENCRYPT_EMAIL}' \
            < workloads/bootstrap/cluster-issuers.yaml \
            | kubectl apply -f -

      # Phase 4 — ArgoCD (GitOps controller)
      # Chart 9.4.17: server.insecure=true for plain-HTTP access via kubectl port-forward.
      # ArgoCD is NOT exposed via the Gateway — access is internal only.
      # Retrieve initial password: kubectl -n argocd get secret argocd-initial-admin-secret
      #   -o jsonpath='{.data.password}' | base64 -d
      - name: Bootstrap AKS — ArgoCD
        shell: bash
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 9.4.17 \
            --set-string 'configs.params.server\.insecure=true' \
            --wait --timeout 10m

      - name: Bootstrap AKS — ArgoCD NetworkPolicy
        shell: bash
        run: |
          set -euo pipefail
          kubectl label ns argocd kubernetes.io/metadata.name=argocd --overwrite
          kubectl apply -f workloads/bootstrap/argocd-netpol.yaml

      # Uploads config/openclaw.batch.json to Azure Files, applies and validates it
      # inside the running container via az containerapp exec + script(1) PTY workaround.
      # Uses node /app/openclaw.mjs directly — no openclaw CLI on the runner needed.
      # continue-on-error: seed failures are non-fatal — Terraform succeeded; config
      # can be re-seeded manually with: bash scripts/seed-openclaw-ci.sh prod
      - name: Seed OpenClaw Config
        continue-on-error: true
        shell: bash
        run: |
          chmod +x scripts/seed-openclaw-ci.sh
          bash scripts/seed-openclaw-ci.sh prod
