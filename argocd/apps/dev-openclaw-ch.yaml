apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ch-openclaw-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CHolmesAtLVS/personal_ai_assistant.git
    targetRevision: HEAD
    path: workloads/dev/openclaw-ch
    helm:
      releaseName: openclaw
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw-ch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: openclaw
      jsonPointers:
        - /data
