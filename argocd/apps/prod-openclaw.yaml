# DEPRECATED — retained during multi-instance migration (SUB-005 TASK-014).
# Remove after ch-openclaw-prod is confirmed healthy and the openclaw namespace is decommissioned.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CHolmesAtLVS/personal_ai_assistant.git
    targetRevision: HEAD
    path: workloads/prod/openclaw
    helm:
      releaseName: openclaw
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      name: openclaw
      jsonPointers:
        - /data
