# configmap.yaml — Non-secret environment configuration for the OpenClaw pod.
#
# TEMPLATE FILE — contains ${VAR} placeholders. Never commit with substituted values.
# Apply via: envsubst < workloads/dev/openclaw/crds/configmap.yaml | kubectl apply -f -
#
# Applied by scripts/seed-openclaw-aks.sh before ArgoCD sync.
# Referenced in values.yaml via containers.main.envFrom[].configMapRef.
#
# Required env vars (populated from GitHub Secrets / Terraform outputs in CI):
#   AZURE_OPENAI_ENDPOINT — Azure AI Services endpoint URL (Terraform output: azure_openai_endpoint)
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-env-config
  namespace: openclaw
data:
  AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT}"
