# secretproviderclass.yaml — Sync Azure Key Vault secrets to Kubernetes Secret
# via the Secrets Store CSI Driver.
#
# TEMPLATE FILE — contains ${VAR} placeholders. Never commit with substituted values.
# Apply via: envsubst < workloads/dev/openclaw/bootstrap/secretproviderclass.yaml | kubectl apply -f -
#
# Required env vars (populated from GitHub Secrets / Terraform outputs in CI):
#   OPENCLAW_MI_CLIENT_ID — Managed Identity client ID (Terraform output)
#   KEY_VAULT_NAME        — Key Vault name (Terraform output)
#   AZURE_TENANT_ID       — Azure tenant ID (GitHub Secret)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: openclaw-kv
  namespace: openclaw
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "${OPENCLAW_MI_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: openclaw-gateway-token
          objectType: secret
          objectAlias: OPENCLAW_GATEWAY_TOKEN
        - |
          objectName: azure-ai-api-key
          objectType: secret
          objectAlias: AZURE_AI_API_KEY
  secretObjects:
    - secretName: openclaw-env-secret
      type: Opaque
      data:
        - objectName: OPENCLAW_GATEWAY_TOKEN
          key: OPENCLAW_GATEWAY_TOKEN
        - objectName: AZURE_AI_API_KEY
          key: AZURE_AI_API_KEY
