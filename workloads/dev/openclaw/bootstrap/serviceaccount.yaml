# serviceaccount.yaml — OpenClaw Kubernetes ServiceAccount with Workload Identity annotation.
#
# TEMPLATE FILE — contains ${VAR} placeholders. Never commit with substituted values.
# Apply via: envsubst < workloads/dev/openclaw/bootstrap/serviceaccount.yaml | kubectl apply -f -
#
# This SA is pre-created by scripts/seed-openclaw-aks.sh before ArgoCD sync so that
# the pod can use it on first start. The chart references it via serviceAccount.name: openclaw.
#
# Required env vars (populated from GitHub Secrets / Terraform outputs in CI):
#   OPENCLAW_MI_CLIENT_ID — Managed Identity client ID (Terraform output)
#
# OIDC federation subject: system:serviceaccount:openclaw:openclaw
# (see terraform/aks-workload-identity.tf)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw
  annotations:
    azure.workload.identity/client-id: "${OPENCLAW_MI_CLIENT_ID}"
