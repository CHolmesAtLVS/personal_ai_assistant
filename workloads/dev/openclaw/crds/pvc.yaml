# pvc.yaml — PersistentVolumeClaim bound to the static NFS PV (dev).
#
# No ${VAR} substitution required — this file can be applied directly.
# Applied by scripts/seed-openclaw-aks.sh before ArgoCD sync.
# Referenced in values.yaml via persistence.data.existingClaim: openclaw-state-nfs.
#
# Binds exclusively to openclaw-state-nfs-dev (set in crds/pv.yaml claimRef).
# REQ-007: 10Gi, ReadWriteOnce.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-state-nfs
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Empty storageClassName binds to a PV with no storage class (our static PV).
  storageClassName: ""
  volumeName: openclaw-state-nfs-dev
