# Umbrella chart values for OpenClaw dev environment.
# All values nested under the 'openclaw:' key (umbrella chart dependency convention).
#
# This file embeds ${VAR} placeholders (e.g. ${OPENCLAW_GATEWAY_TOKEN},
# ${AZURE_OPENAI_ENDPOINT}, ${AZURE_AI_API_KEY}) resolved by OpenClaw at runtime
# from container environment variables injected via openclaw-env-secret and
# openclaw-env-config. Additional environment-specific Kubernetes resources are
# applied from bootstrap/ manifests before ArgoCD sync:
#   bootstrap/serviceaccount.yaml      — SA with ${OPENCLAW_MI_CLIENT_ID} annotation
#   bootstrap/configmap.yaml           — ${AZURE_OPENAI_ENDPOINT}
#   bootstrap/secretproviderclass.yaml — Key Vault wiring

openclaw:
  app-template:
    # Image version — pinned, never 'latest' (REQ-001).
    openclawVersion: "2026.4.8"

    # Config mode: merge preserves paired devices and UI changes across pod restarts (REQ-003).
    # Pair with ArgoCD ignoreDifferences on the openclaw ConfigMap (argocd/apps/dev-openclaw.yaml).
    configMode: merge

    # --------------------------------------------------------------------------
    # openclaw.json configuration (TASK-008)
    # ${OPENCLAW_GATEWAY_TOKEN} uses OpenClaw built-in env substitution at runtime
    # (injected via openclaw-env-secret through envFrom).
    # Application is only reachable externally via HTTPS on port 443 through the
    # Gateway HTTPRoute. Port 18789 is internal to the cluster only.
    # --------------------------------------------------------------------------
    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "mode": "local",
                "port": 18789,
                "bind": "lan",
                "auth": {
                  "mode": "token",
                  "token": "${OPENCLAW_GATEWAY_TOKEN}"
                },
                // trustedProxies: set to the nginx Gateway pod IPs in gateway-system.
                // CIDR notation is NOT supported — list individual IPs.
                // Retrieve after first deploy: kubectl get pods -n gateway-system -o wide
                "trustedProxies": []
              },
              "agents": {
                "defaults": {
                  "model": {
                    "primary": "azure-openai/gpt-5.4-mini"
                  }
                }
              },
              "models": {
                "providers": {
                  "azure-openai": {
                    "baseUrl": "${AZURE_OPENAI_ENDPOINT}/openai/deployments/gpt-5.4-mini",
                    "apiKey": "${AZURE_AI_API_KEY}",
                    "api": "openai-completions",
                    "models": [
                      {
                        "id": "gpt-5.4-mini",
                        "name": "GPT-5.4 Mini (Azure)",
                        "contextWindow": 128000,
                        "maxTokens": 16384
                      }
                    ]
                  }
                }
              },
              "update": {
                "checkOnStart": false
              },
              "tools": {
                "profile": "full"
              }
            }

    # Workload Identity pod label — required by the Azure WI mutating webhook (REQ-008).
    defaultPodOptions:
      labels:
        azure.workload.identity/use: "true"

    # --------------------------------------------------------------------------
    # Container configuration (TASK-007)
    # --------------------------------------------------------------------------
    controllers:
      main:
        # --------------------------------------------------------------------------
        # Service account (TASK-007, REQ-008)
        # SA is pre-created by crds/serviceaccount.yaml with the WI annotation.
        # app-template v4: external SA referenced via controllers.<name>.serviceAccount.name.
        # --------------------------------------------------------------------------
        serviceAccount:
          name: openclaw
        containers:
          main:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "2026.4.8"
            envFrom:
              # Secrets: OPENCLAW_GATEWAY_TOKEN, AZURE_AI_API_KEY (from Key Vault via CSI)
              - secretRef:
                  name: openclaw-env-secret
              # Non-secret config: AZURE_OPENAI_ENDPOINT (from crds/configmap.yaml)
              - configMapRef:
                  name: openclaw-env-config
            env:
              APP_FQDN: "https://paa-dev.acmeadventure.ca"

    # --------------------------------------------------------------------------
    # Network policies (TASK-010, REQ-005)
    # Default rules: ingress from gateway-system on port 18789 only; egress to
    # kube-dns and public internet (blocks RFC1918). The application is never
    # directly reachable on port 80 or 443 — external HTTPS-only access is
    # enforced at the Gateway HTTPRoute level (REQ-006, Phase 4 TASK-013).
    # --------------------------------------------------------------------------
    networkpolicies:
      main:
        enabled: true

    # --------------------------------------------------------------------------
    # Persistence (TASK-009, TASK-011)
    # --------------------------------------------------------------------------
    persistence:
      # Managed disk (Azure Disk CSI, Premium SSD) — dynamically provisioned.
      # No static PV required; WaitForFirstConsumer ensures scheduling before provisioning.
      # NFS Azure Files was originally planned but requires private endpoint/VNet setup
      # not yet in Terraform; managed disk unblocks deployment immediately.
      # ACA state migration can be done separately (azcopy) if needed.
      data:
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: managed-csi-premium

      # CSI secrets-store volume mount (TASK-011, REQ-002).
      # Mounting this volume triggers SecretProviderClass sync which creates the
      # openclaw-env-secret Kubernetes Secret consumed by envFrom above.
      secrets:
        type: custom
        volumeSpec:
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: openclaw-kv
        advancedMounts:
          main:
            main:
              - path: /mnt/secrets-store
                readOnly: true
