---
# HTTPRoute: HTTP → HTTPS redirect for prod (paa.acmeadventure.ca).
#
# Attaches to the HTTP listener (port 80). All HTTP requests are permanently
# redirected to HTTPS. HTTP-01 ACME challenges from cert-manager are handled
# before this redirect rule fires.
#
# Both environments use letsencrypt-staging until certificates are confirmed
# stable, then the Gateway annotation is updated to letsencrypt-prod (TASK-015).
#
# REQ-006: External access via HTTPS on port 443 only.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-http-redirect
  namespace: openclaw
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - paa.acmeadventure.ca
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# HTTPRoute: HTTPS traffic to the OpenClaw service (prod).
#
# Attaches to the https-prod listener (port 443, hostname paa.acmeadventure.ca).
# All paths are forwarded to the openclaw service on port 18789 (internal only).
# TLS is terminated at the Gateway; traffic inside the cluster is plain HTTP.
#
# REQ-006: HTTPRoute routes traffic from the hostname to the OpenClaw service on port 18789.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-https
  namespace: openclaw
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
      sectionName: https-prod
  hostnames:
    - paa.acmeadventure.ca
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: openclaw
          port: 18789
