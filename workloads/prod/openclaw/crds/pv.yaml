# pv.yaml — Static PersistentVolume for the OpenClaw NFS Azure Files share (prod).
#
# TEMPLATE FILE — contains ${VAR} placeholders. Never commit with substituted values.
# Apply via: envsubst < workloads/prod/openclaw/crds/pv.yaml | kubectl apply -f -
#
# Applied by scripts/seed-openclaw-aks.sh before ArgoCD sync.
# The NFS share is provisioned by Terraform (terraform/storage-aks.tf).
# Workload Identity (Storage Account Contributor) handles NFS auth — no storage key required.
# Mount path inside the pod: /home/node/.openclaw
#
# Required env vars (populated from Terraform outputs in CI):
#   NFS_STORAGE_ACCOUNT_NAME  — NFS premium storage account name
#                               (Terraform output: openclaw_nfs_storage_account_name)
#   AKS_NODE_RESOURCE_GROUP   — AKS node resource group
#                               (Terraform output: aks_node_resource_group)
#
# REQ-007: 10Gi, ReadWriteOnce, NFS protocol for full POSIX semantics (chmod/chown).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-state-nfs-prod
  annotations:
    # Prevent accidental deletion of the underlying share data.
    pv.kubernetes.io/bound-by-controller: "yes"
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  csi:
    driver: file.csi.azure.com
    readOnly: false
    # volumeHandle must be unique per PV in the cluster.
    volumeHandle: openclaw-state-nfs-prod
    volumeAttributes:
      protocol: nfs
      storageAccount: "${NFS_STORAGE_ACCOUNT_NAME}"
      shareName: openclaw-nfs
      # NFS mounts use network-level auth via Workload Identity (nodeStageSecretRef not required).
      resourceGroup: "${AKS_NODE_RESOURCE_GROUP}"
  # Pre-bind to the PVC so no other claim can acquire this PV.
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: openclaw-state-nfs
    namespace: openclaw
