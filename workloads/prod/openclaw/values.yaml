# Umbrella chart values for OpenClaw prod environment.
# All values nested under the 'openclaw:' key (umbrella chart dependency convention).
#
# This file contains NO ${VAR} placeholders. Environment-specific values that
# require substitution are injected via crds/ manifests applied by
# scripts/seed-openclaw-aks.sh before ArgoCD sync:
#   crds/serviceaccount.yaml  — SA with ${OPENCLAW_MI_CLIENT_ID} annotation
#   crds/configmap.yaml       — ${AZURE_OPENAI_ENDPOINT}
#   crds/pv.yaml              — ${NFS_STORAGE_ACCOUNT_NAME}
#   crds/secretproviderclass.yaml — Key Vault wiring

openclaw:
  app-template:
    # Image version — pinned, never 'latest' (REQ-001).
    openclawVersion: "2026.4.8"

    # Config mode: merge preserves paired devices and UI changes across pod restarts (REQ-003).
    # Pair with ArgoCD ignoreDifferences on the openclaw ConfigMap (argocd/apps/prod-openclaw.yaml).
    configMode: merge

    # --------------------------------------------------------------------------
    # openclaw.json configuration (TASK-012)
    # ${OPENCLAW_GATEWAY_TOKEN} uses OpenClaw built-in env substitution at runtime
    # (injected via openclaw-env-secret through envFrom).
    # Application is only reachable externally via HTTPS on port 443 through the
    # Gateway HTTPRoute. Port 18789 is internal to the cluster only.
    # --------------------------------------------------------------------------
    configMaps:
      config:
        data:
          openclaw.json: |
            {
              "gateway": {
                "port": 18789,
                "bind": "lan",
                "auth": {
                  "mode": "token",
                  "token": "${OPENCLAW_GATEWAY_TOKEN}"
                },
                // trustedProxies: set to the nginx Gateway pod IPs in gateway-system.
                // CIDR notation is NOT supported — list individual IPs.
                // Retrieve after first deploy: kubectl get pods -n gateway-system -o wide
                "trustedProxies": []
              },
              "allowedOrigins": ["https://paa.acmeadventure.ca"],
              "agents": {
                "defaults": {
                  "model": {
                    "primary": "grok-4-fast-reasoning"
                  }
                }
              },
              "models": {
                "lightweightModel": "grok-3-mini"
              },
              "update": {
                "checkOnStart": false
              },
              "tools": {
                "profile": "full"
              }
            }

    # Workload Identity pod label — required by the Azure WI mutating webhook (REQ-008).
    defaultPodOptions:
      labels:
        azure.workload.identity/use: "true"

    # --------------------------------------------------------------------------
    # Container configuration (TASK-012)
    # --------------------------------------------------------------------------
    controllers:
      main:
        # Service account: external SA referenced via controllers.<name>.serviceAccount.name
        # (app-template v4 schema; SA created by crds/serviceaccount.yaml).
        serviceAccount:
          name: openclaw
        containers:
          main:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: "2026.4.8"
            envFrom:
              # Secrets: OPENCLAW_GATEWAY_TOKEN, AZURE_AI_API_KEY (from Key Vault via CSI)
              - secretRef:
                  name: openclaw-env-secret
              # Non-secret config: AZURE_OPENAI_ENDPOINT (from crds/configmap.yaml)
              - configMapRef:
                  name: openclaw-env-config
            env:
              APP_FQDN: "https://paa.acmeadventure.ca"

    # --------------------------------------------------------------------------
    # Network policies (TASK-012, REQ-005)
    # Default rules: ingress from gateway-system on port 18789 only; egress to
    # kube-dns and public internet (blocks RFC1918). The application is never
    # directly reachable on port 80 or 443 — external HTTPS-only access is
    # enforced at the Gateway HTTPRoute level (REQ-006, Phase 4 TASK-016).
    # --------------------------------------------------------------------------
    networkpolicies:
      main:
        enabled: true

    # --------------------------------------------------------------------------
    # Persistence (TASK-012, REQ-007)
    # --------------------------------------------------------------------------
    persistence:
      # Static NFS Azure Files share (REQ-007, 10Gi).
      # PV and PVC are defined in crds/pv.yaml and crds/pvc.yaml.
      # app-template v4 oneOf[1]: type: persistentVolumeClaim + existingClaim references an
      # existing PVC without creating one. The chart defaults 'size' and 'accessMode' must be
      # explicitly nulled (Helm removes null-keyed values from the merge, so the schema validator
      # sees only the allowed properties for the existingClaim variant).
      data:
        type: persistentVolumeClaim
        existingClaim: openclaw-state-nfs
        size: null
        accessMode: null
        # advancedMounts inherited from chart defaults: mounts /home/node/.openclaw for
        # init-config, init-skills, and main containers (no override needed).

      # CSI secrets-store volume mount (REQ-002).
      # Mounting this volume triggers SecretProviderClass sync which creates the
      # openclaw-env-secret Kubernetes Secret consumed by envFrom above.
      secrets:
        type: custom
        volumeSpec:
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: openclaw-kv
        advancedMounts:
          main:
            main:
              - path: /mnt/secrets-store
                readOnly: true
