# TEMPLATE — applied by scripts/seed-openclaw-aks.sh via envsubst. Not committed per-instance.
#
# Variables substituted at seed time:
#   INST       — instance name (e.g. ch, jh, kjm)
#   ENV        — environment (dev or prod)
#   INST_FQDN  — instance hostname, no scheme (e.g. ch.paa-dev.acmeadventure.ca)
---
# HTTP → HTTPS redirect for this instance hostname.
# Also handles HTTP-01 ACME challenges (cert-manager solver fires before this redirect).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-http-redirect
  namespace: openclaw-${INST}
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - ${INST_FQDN}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# HTTPS traffic forwarded to openclaw service port 18789.
# TLS terminated at the Gateway; traffic inside the cluster is plain HTTP.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-https
  namespace: openclaw-${INST}
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
      sectionName: https-${INST}-${ENV}
  hostnames:
    - ${INST_FQDN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: openclaw
          port: 18789
