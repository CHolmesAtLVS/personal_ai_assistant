# TEMPLATE — applied by scripts/seed-openclaw-aks.sh via envsubst. Not committed per-instance.
#
# Variables substituted at seed time:
#   INST                  — instance name (e.g. ch, jh, kjm)
#   OPENCLAW_MI_CLIENT_ID — instance Managed Identity client ID (Terraform output)
#   KEY_VAULT_NAME        — Key Vault name (Terraform output)
#   AZURE_TENANT_ID       — Azure tenant ID (GitHub Secret)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: openclaw-kv
  namespace: openclaw-${INST}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "${OPENCLAW_MI_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: ${INST}-openclaw-gateway-token
          objectType: secret
          objectAlias: OPENCLAW_GATEWAY_TOKEN
        - |
          objectName: azure-ai-api-key
          objectType: secret
          objectAlias: AZURE_AI_API_KEY
  secretObjects:
    - secretName: openclaw-env-secret
      type: Opaque
      data:
        - objectName: OPENCLAW_GATEWAY_TOKEN
          key: OPENCLAW_GATEWAY_TOKEN
        - objectName: AZURE_AI_API_KEY
          key: AZURE_AI_API_KEY
