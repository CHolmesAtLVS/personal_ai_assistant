# TEMPLATE — applied by scripts/seed-openclaw-aks.sh via envsubst. Not committed per-instance.
#
# Variables substituted at seed time:
#   INST                  — instance name (e.g. ch, jh, kjm)
#   OPENCLAW_MI_CLIENT_ID — instance Managed Identity client ID (Terraform output)
#
# OIDC federation subject: system:serviceaccount:openclaw-${INST}:openclaw
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw-${INST}
  annotations:
    azure.workload.identity/client-id: "${OPENCLAW_MI_CLIENT_ID}"
